<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ostad → Telegram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap');

  :root {
    --bg:      #F5F5F5;
    --surface: #141720;
    --border:  #1e2330;
    --accent:  #00e5a0;
    --accent2: #0070f3;
    --warn:    #ffb800;
    --err:     #ff4466;
    --text:    #c8cdd8;
    --dim:     #4a5068;
    --mono:    'JetBrains Mono', monospace;
    --head:    'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo {
    font-family: var(--head);
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  #conn-badge {
    background: #1a2a1e;
    color: var(--accent);
    border: 1px solid #1e4030;
  }
  #conn-badge.off {
    background: #2a1a1e;
    color: var(--err);
    border-color: #4a1e28;
  }
  .stats {
    margin-left: auto;
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--dim);
  }
  .stats b { color: var(--text); }

  /* ── Main layout ── */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px 0;
    display: grid;
    gap: 20px;
  }

  /* ── Panel ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .panel-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--dim);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-head .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* ── Input area ── */
  .input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }
  @media(max-width:600px) {
    .input-grid { grid-template-columns: 1fr; }
  }
  .input-col {
    background: var(--surface);
    padding: 14px;
  }
  .col-label {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }
  .col-label .optional {
    color: #2a3048;
    font-style: italic;
  }
  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 12px;
    resize: vertical;
    min-height: 160px;
    outline: none;
    line-height: 1.7;
    transition: border-color .2s;
  }

  textarea:focus { border-color: var(--accent2); }
  #titles-input {
    white-space: pre;
    overflow-x: auto;
    word-break: keep-all;
  }
  textarea::placeholder { color: var(--dim); }

  .actions {
    padding: 14px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    border-top: 1px solid var(--border);
  }
  .line-count {
    font-size: 11px;
    color: var(--dim);
    margin-right: auto;
  }
  .line-count b { color: var(--accent); }

  button {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    padding: 9px 18px;
    transition: all .15s;
    letter-spacing: 0.3px;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { background: #00ffb3; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { background: #1e3028; color: var(--dim); cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: transparent;
    color: var(--dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--dim); }

  /* ── Queue list ── */
  #queue-list { padding: 8px 0; }
  .queue-empty {
    padding: 24px;
    text-align: center;
    color: var(--dim);
    font-size: 12px;
  }
  .job-row {
    padding: 10px 16px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .1s;
  }
  .job-row:last-child { border-bottom: none; }
  .job-row:hover { background: rgba(255,255,255,.02); }
  .job-row.active { background: rgba(0,229,160,.04); }

  .job-status {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .job-status.pending  { background: var(--dim); }
  .job-status.running  { background: var(--warn); box-shadow: 0 0 6px var(--warn); animation: pulse 1s infinite; }
  .job-status.done     { background: var(--accent); }
  .job-status.failed   { background: var(--err); }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: .4; }
  }

  .job-info { overflow: hidden; }
  .job-title {
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .job-url {
    font-size: 11px;
    color: var(--dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .job-meta {
    font-size: 11px;
    color: var(--dim);
    text-align: right;
    white-space: nowrap;
  }

  /* ── Log panel ── */
  #log-panel { display: none; }
  #log-title {
    font-size: 12px;
    color: var(--text);
    font-weight: 600;
  }
  #log-box {
    background: #080a0f;
    padding: 14px;
    height: 320px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.8;
    font-family: var(--mono);
  }
  #log-box::-webkit-scrollbar { width: 4px; }
  #log-box::-webkit-scrollbar-track { background: transparent; }
  #log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-line { white-space: pre-wrap; word-break: break-all; }
  .log-line.dl   { color: var(--accent2); }
  .log-line.up   { color: #a78bfa; }
  .log-line.done { color: var(--accent); font-weight: 600; }
  .log-line.err  { color: var(--err); }
  .log-line.srv  { color: var(--dim); }
  .log-line.warn { color: var(--warn); }
  .log-line.job  { color: #64748b; }
</style>
</head>
<body>

<header>
  <div class="logo">Ostad <span>→</span> TG</div>
  <div class="badge" id="conn-badge">● CONNECTING</div>
  <div class="stats">
    <span>Pending: <b id="s-pending">0</b></span>
    <span>Done: <b id="s-done">0</b></span>
    <span>Failed: <b id="s-failed">0</b></span>
  </div>
</header>

<main>

  <!-- Input -->
  <div class="panel">
    <div class="panel-head"><div class="dot"></div>BULK ADD JOBS</div>
    <div class="input-grid">
      <div class="input-col">
        <div class="col-label">
          <span>M3U8 LINKS</span>
          <span>one per line</span>
        </div>
        <textarea id="links-input"
          placeholder="https://cdn.ostad.app/.../master.m3u8&#10;https://cdn.ostad.app/.../master.m3u8&#10;..."></textarea>
      </div>
      <div class="input-col">
        <div class="col-label">
          <span>TITLES</span>
          <span class="optional">optional — line matches link</span>
        </div>
        <textarea id="titles-input"
          placeholder="Class 01 - Introduction&#10;Class 02 - Variables&#10;..."></textarea>
      </div>
    </div>
    <div class="actions">
      <div class="line-count">
        <b id="link-count">0</b> links detected
      </div>
      <button class="btn-ghost" onclick="clearInputs()">Clear</button>
      <button class="btn-primary" id="add-btn" onclick="addJobs()">▶ Add to Queue</button>
    </div>
  </div>

  <!-- Queue -->
  <div class="panel">
    <div class="panel-head">
      <div class="dot"></div>
      QUEUE
      <span style="margin-left:auto">
        <button class="btn-ghost" style="padding:4px 10px;font-size:11px" onclick="clearDone()">Clear Finished</button>
      </span>
    </div>
    <div id="queue-list">
      <div class="queue-empty">No jobs yet. Paste links above and add to queue.</div>
    </div>
  </div>

  <!-- Log panel -->
  <div class="panel" id="log-panel">
    <div class="panel-head">
      <div class="dot" style="background:var(--warn)"></div>
      LIVE LOG — <span id="log-title">—</span>
      <span style="margin-left:auto;display:flex;gap:8px">
        <button class="btn-ghost" style="padding:4px 10px;font-size:11px" onclick="clearLog()">Clear</button>
        <button class="btn-ghost" style="padding:4px 10px;font-size:11px" id="autoscroll-btn" onclick="toggleScroll()">Auto-scroll ✓</button>
      </span>
    </div>
    <div id="log-box"></div>
  </div>

</main>

<script>
// ── State ──────────────────────────────────────────────────────
let queueState   = { jobs: [], pending: 0, done: 0, failed: 0 };
let activeJobId  = null;
let autoScroll   = true;

// ── SSE ───────────────────────────────────────────────────────
const badge = document.getElementById("conn-badge");

function connectSSE() {
  const es = new EventSource("/events");

  es.addEventListener("queue", e => {
    queueState = JSON.parse(e.data);
    renderQueue();
    updateStats();
  });

  es.addEventListener("log", e => {
    const { id, line } = JSON.parse(e.data);
    if (id === activeJobId) appendLog(line);
  });

  es.onopen = () => {
    badge.textContent = "● LIVE";
    badge.className = "badge";
  };

  es.onerror = () => {
    badge.textContent = "● OFFLINE";
    badge.className = "badge off";
    setTimeout(connectSSE, 3000);
    es.close();
  };
}
connectSSE();

// ── Link counter ──────────────────────────────────────────────
document.getElementById("links-input").addEventListener("input", () => {
  const lines = document.getElementById("links-input").value
    .split("\n").filter(l => l.trim().includes(".m3u8"));
  document.getElementById("link-count").textContent = lines.length;
});

// ── Add jobs ─────────────────────────────────────────────────
function addJobs() {
  const linksRaw  = document.getElementById("links-input").value;
  const titlesRaw = document.getElementById("titles-input").value;

  const links  = linksRaw.split("\n").map(l => l.trim()).filter(l => l.includes(".m3u8"));
  const titles = titlesRaw.split("\n").map(l => l.trim());

  if (!links.length) {
    alert("No valid .m3u8 links found!");
    return;
  }

  const btn = document.getElementById("add-btn");
  btn.disabled = true;
  btn.textContent = "Adding...";

  fetch("/add", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ links, titles }),
  })
  .then(r => r.json())
  .then(data => {
    if (data.ok) {
      document.getElementById("links-input").value  = "";
      document.getElementById("titles-input").value = "";
      document.getElementById("link-count").textContent = "0";
    } else {
      alert("Error: " + data.error);
    }
  })
  .catch(e => alert("Network error: " + e))
  .finally(() => {
    btn.disabled = false;
    btn.textContent = "▶ Add to Queue";
  });
}

function clearInputs() {
  document.getElementById("links-input").value  = "";
  document.getElementById("titles-input").value = "";
  document.getElementById("link-count").textContent = "0";
}

// ── Queue render ─────────────────────────────────────────────
function renderQueue() {
  const el = document.getElementById("queue-list");
  if (!queueState.jobs.length) {
    el.innerHTML = `<div class="queue-empty">No jobs yet. Paste links above and add to queue.</div>`;
    return;
  }

  el.innerHTML = queueState.jobs.map(job => {
    const isActive = job.id === activeJobId;
    const elapsed  = job.started && !job.ended
      ? ` — ${fmtTime(Math.floor((Date.now() - job.started) / 1000))}`
      : job.started && job.ended
      ? ` — ${fmtTime(Math.floor((job.ended - job.started) / 1000))}`
      : "";

    return `
    <div class="job-row ${isActive ? 'active' : ''}" onclick="selectJob(${job.id})">
      <div class="job-status ${job.status}"></div>
      <div class="job-info">
        <div class="job-title">${escHtml(job.title)}</div>
        <div class="job-url">${escHtml(job.m3u8)}</div>
      </div>
      <div class="job-meta">
        <div style="color:${statusColor(job.status)}">${job.status.toUpperCase()}</div>
        <div>${elapsed}</div>
      </div>
    </div>`;
  }).join("");

  // Auto-open running job if nothing selected
  if (!activeJobId || !queueState.jobs.find(j => j.id === activeJobId)) {
    const running = queueState.jobs.find(j => j.status === "running");
    if (running) selectJob(running.id);
  }
}

function statusColor(s) {
  return { pending:"var(--dim)", running:"var(--warn)", done:"var(--accent)", failed:"var(--err)" }[s] || "var(--dim)";
}

// ── Select job → show logs ────────────────────────────────────
function selectJob(id) {
  activeJobId = id;
  const job   = queueState.jobs.find(j => j.id === id);
  if (!job) return;

  document.getElementById("log-panel").style.display = "block";
  document.getElementById("log-title").textContent   = job.title || `Video_${job.id}`;
  document.getElementById("log-box").innerHTML       = "";

  // Fetch existing logs
  fetch(`/logs/${id}`)
    .then(r => r.json())
    .then(data => {
      if (data.logs) data.logs.forEach(appendLog);
    });
}

// ── Log rendering ─────────────────────────────────────────────
function appendLog(line) {
  const box  = document.getElementById("log-box");
  const div  = document.createElement("div");
  div.className = "log-line " + classifyLog(line);
  div.textContent = line;
  box.appendChild(div);
  if (autoScroll) box.scrollTop = box.scrollHeight;
}

function classifyLog(line) {
  if (line.includes("[ERR]") || line.includes("PY-ERR") || line.includes("✗")) return "err";
  if (line.includes("[DONE]") || line.includes("✓"))   return "done";
  if (line.includes("[DL]"))    return "dl";
  if (line.includes("[UP]"))    return "up";
  if (line.includes("[JOB]"))   return "job";
  if (line.includes("[SERVER]"))return "srv";
  if (line.includes("WARN") || line.includes("[!]")) return "warn";
  return "";
}

function clearLog() {
  document.getElementById("log-box").innerHTML = "";
}

function toggleScroll() {
  autoScroll = !autoScroll;
  document.getElementById("autoscroll-btn").textContent =
    autoScroll ? "Auto-scroll ✓" : "Auto-scroll ✗";
}

// ── Stats ─────────────────────────────────────────────────────
function updateStats() {
  document.getElementById("s-pending").textContent = queueState.pending;
  document.getElementById("s-done").textContent    = queueState.done;
  document.getElementById("s-failed").textContent  = queueState.failed;
}

// ── Clear done ────────────────────────────────────────────────
function clearDone() {
  fetch("/clear", { method: "POST" }).catch(() => {});
}

// ── Helpers ──────────────────────────────────────────────────
function fmtTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h) return `${h}h ${m}m ${s}s`;
  if (m) return `${m}m ${s}s`;
  return `${s}s`;
}
function escHtml(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Refresh elapsed times every 5s for running jobs
setInterval(() => { if (queueState.jobs.some(j => j.status === "running")) renderQueue(); }, 5000);
</script>
</body>
</html>
