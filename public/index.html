<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ostad DL</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f0f; color: #eee; font-family: sans-serif; padding: 16px; }
  h1 { color: #7c6aff; margin-bottom: 16px; font-size: 1.3rem; }

  .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .row input { flex: 1; background: #1e1e1e; border: 1px solid #333; color: #eee; padding: 10px 12px; border-radius: 8px; font-size: 0.9rem; }
  .row input:focus { outline: none; border-color: #7c6aff; }
  .row input::placeholder { color: #555; }
  .del-btn { background: #2a2a2a; border: none; color: #888; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; flex-shrink: 0; }
  .del-btn:hover { background: #ff4444; color: #fff; }

  .add-btn { background: #1e1e1e; border: 1px dashed #444; color: #7c6aff; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.95rem; margin-bottom: 12px; }
  .add-btn:hover { border-color: #7c6aff; background: #1a1a2e; }

  .submit-btn { background: #7c6aff; border: none; color: #fff; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; }
  .submit-btn:hover { background: #6a58e0; }
  .submit-btn:disabled { background: #444; cursor: not-allowed; }

  #msg { margin-top: 12px; padding: 10px 12px; border-radius: 8px; font-size: 0.9rem; display: none; }
  #msg.ok { background: #1a3a1a; color: #4caf50; border: 1px solid #2e5a2e; }
  #msg.err { background: #3a1a1a; color: #f44336; border: 1px solid #5a2e2e; }

  .jobs { margin-top: 20px; }
  .jobs h2 { font-size: 1rem; color: #888; margin-bottom: 10px; }
  .job { background: #1a1a1a; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; border-left: 3px solid #333; }
  .job.done { border-left-color: #4caf50; }
  .job.error { border-left-color: #f44336; }
  .job.downloading { border-left-color: #ff9800; }
  .job.uploading { border-left-color: #2196f3; }
  .job.queued { border-left-color: #555; }
  .job-title { font-size: 0.9rem; font-weight: bold; margin-bottom: 4px; }
  .job-status { font-size: 0.78rem; color: #888; }
  .job-link a { color: #7c6aff; font-size: 0.82rem; word-break: break-all; }
  .progress-bar { height: 4px; background: #333; border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: #ff9800; border-radius: 2px; transition: width 0.5s; }
</style>
</head>
<body>

<h1>📥 Ostad DL → Telegram</h1>

<div id="rows"></div>
<button class="add-btn" onclick="addRow()">＋ Add more</button>
<button class="submit-btn" id="submitBtn" onclick="submitAll()">🚀 Submit All</button>
<div id="msg"></div>

<div class="jobs">
  <h2>Job Status</h2>
  <div id="jobList"></div>
</div>

<script>
let rowCount = 0;

function addRow(m3u8 = '', title = '') {
  rowCount++;
  const id = 'row_' + rowCount;
  const div = document.createElement('div');
  div.className = 'row';
  div.id = id;
  div.innerHTML = `
    <input type="text" placeholder="m3u8 link" class="m3u8" value="${m3u8}">
    <input type="text" placeholder="Title" class="title" value="${title}">
    <button class="del-btn" onclick="removeRow('${id}')">✕</button>
  `;
  document.getElementById('rows').appendChild(div);
}

function removeRow(id) {
  const el = document.getElementById(id);
  if (el && document.querySelectorAll('.row').length > 1) el.remove();
}

async function submitAll() {
  const rows = document.querySelectorAll('.row');
  const items = [];
  rows.forEach(row => {
    const m3u8 = row.querySelector('.m3u8').value.trim();
    const title = row.querySelector('.title').value.trim();
    if (m3u8) items.push({ m3u8, title });
  });

  if (items.length === 0) {
    showMsg('কোনো link নেই!', false);
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    const res = await fetch('/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items }),
    });
    const data = await res.json();
    if (data.ok) {
      showMsg(`✓ ${data.added.length}টা job queue হয়েছে!`, true);
      // Clear rows
      document.getElementById('rows').innerHTML = '';
      rowCount = 0;
      addRow();
    } else {
      showMsg('Error: ' + data.error, false);
    }
  } catch (e) {
    showMsg('Server error: ' + e.message, false);
  }

  btn.disabled = false;
  btn.textContent = '🚀 Submit All';
}

function showMsg(text, ok) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = ok ? 'ok' : 'err';
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function statusLabel(job) {
  if (job.status === 'queued') return '⏳ Queue এ আছে';
  if (job.status === 'downloading') return `⬇️ Downloading... ${job.progress || 0}%`;
  if (job.status === 'uploading') return `⬆️ Uploading... ${job.sizeMB || '?'} MB`;
  if (job.status === 'done') return '✅ Done';
  if (job.status === 'error') return '❌ Error: ' + job.error;
  return job.status;
}

async function refreshStatus() {
  try {
    const res = await fetch('/status');
    const data = await res.json();
    const list = document.getElementById('jobList');
    if (data.jobs.length === 0) {
      list.innerHTML = '<div style="color:#555;font-size:0.85rem">কোনো job নেই</div>';
      return;
    }
    // Show latest first
    const sorted = [...data.jobs].reverse();
    list.innerHTML = sorted.map(job => `
      <div class="job ${job.status}">
        <div class="job-title">${job.title}</div>
        <div class="job-status">${statusLabel(job)}</div>
        ${job.status === 'downloading' ? `<div class="progress-bar"><div class="progress-fill" style="width:${job.progress || 0}%"></div></div>` : ''}
        ${job.link ? `<div class="job-link"><a href="${job.link}" target="_blank">${job.link}</a></div>` : ''}
      </div>
    `).join('');
  } catch (e) {}
}

// Init
addRow();
setInterval(refreshStatus, 2000);
refreshStatus();
</script>
</body>
</html>
